name: Android CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # 4. Permission
      - name: Grant permission
        run: chmod +x gradlew

      # 5.Ktlint
      - name: Ktlint Check
        run: ./gradlew ktlintCheck

      # 6. Lint
      - name: Run Lint
        run: ./gradlew lint

      # 7. Unit Tests
      - name: Run Tests
        run: ./gradlew test

      # 8. 🔥 Build APK (skip tests here)
      - name: Build APK
        run: ./gradlew assembleDebug -x test

      # 9. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk